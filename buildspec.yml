version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo Installing dependencies on `date`
      - npm install

  build:
    commands:
      - echo Build started on `date`
      - echo Application main file is server.js running on port 8080

  post_build:
    commands:
      - echo Build completed on `date`
      - echo Artifact will be uploaded to S3

artifacts:
  files:
    - '**/*'
  discard-paths: no